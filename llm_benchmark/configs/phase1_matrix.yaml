# Phase 1: Model Screening (Sequential flow fixed)
# 5 models × 2 gate_modes × 3 repeats = 30 experiments

phase: 1
flow: sequential
n_candidates: 4
max_iterations: 3
top_k: 3
validation_n_trials: 1

seeds: [42, 137, 256]

experiments:
  # M1: Qwen2.5-7B — static
  - {id: "P1-01", model: qwen2_5_7b,    seed: 42,  gate_mode: static}
  - {id: "P1-02", model: qwen2_5_7b,    seed: 137, gate_mode: static}
  - {id: "P1-03", model: qwen2_5_7b,    seed: 256, gate_mode: static}
  # M1: Qwen2.5-7B — adaptive
  - {id: "P1-04", model: qwen2_5_7b,    seed: 42,  gate_mode: adaptive}
  - {id: "P1-05", model: qwen2_5_7b,    seed: 137, gate_mode: adaptive}
  - {id: "P1-06", model: qwen2_5_7b,    seed: 256, gate_mode: adaptive}

  # M2: Qwen3.5-27B — static
  - {id: "P1-07", model: qwen3_5_27b,   seed: 42,  gate_mode: static}
  - {id: "P1-08", model: qwen3_5_27b,   seed: 137, gate_mode: static}
  - {id: "P1-09", model: qwen3_5_27b,   seed: 256, gate_mode: static}
  # M2: Qwen3.5-27B — adaptive
  - {id: "P1-10", model: qwen3_5_27b,   seed: 42,  gate_mode: adaptive}
  - {id: "P1-11", model: qwen3_5_27b,   seed: 137, gate_mode: adaptive}
  - {id: "P1-12", model: qwen3_5_27b,   seed: 256, gate_mode: adaptive}

  # M3: Qwen3-32B — static
  - {id: "P1-13", model: qwen3_32b,     seed: 42,  gate_mode: static}
  - {id: "P1-14", model: qwen3_32b,     seed: 137, gate_mode: static}
  - {id: "P1-15", model: qwen3_32b,     seed: 256, gate_mode: static}
  # M3: Qwen3-32B — adaptive
  - {id: "P1-16", model: qwen3_32b,     seed: 42,  gate_mode: adaptive}
  - {id: "P1-17", model: qwen3_32b,     seed: 137, gate_mode: adaptive}
  - {id: "P1-18", model: qwen3_32b,     seed: 256, gate_mode: adaptive}

  # M4: DeepSeek-R1-32B — static
  - {id: "P1-19", model: deepseek_r1_32b, seed: 42,  gate_mode: static}
  - {id: "P1-20", model: deepseek_r1_32b, seed: 137, gate_mode: static}
  - {id: "P1-21", model: deepseek_r1_32b, seed: 256, gate_mode: static}
  # M4: DeepSeek-R1-32B — adaptive
  - {id: "P1-22", model: deepseek_r1_32b, seed: 42,  gate_mode: adaptive}
  - {id: "P1-23", model: deepseek_r1_32b, seed: 137, gate_mode: adaptive}
  - {id: "P1-24", model: deepseek_r1_32b, seed: 256, gate_mode: adaptive}

  # M5: GLM-Z1-32B — static
  - {id: "P1-25", model: glm_z1_32b,    seed: 42,  gate_mode: static}
  - {id: "P1-26", model: glm_z1_32b,    seed: 137, gate_mode: static}
  - {id: "P1-27", model: glm_z1_32b,    seed: 256, gate_mode: static}
  # M5: GLM-Z1-32B — adaptive
  - {id: "P1-28", model: glm_z1_32b,    seed: 42,  gate_mode: adaptive}
  - {id: "P1-29", model: glm_z1_32b,    seed: 137, gate_mode: adaptive}
  - {id: "P1-30", model: glm_z1_32b,    seed: 256, gate_mode: adaptive}
