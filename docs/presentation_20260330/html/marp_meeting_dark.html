<h2 id="%ED%94%84%EB%A1%9C%EC%A0%9D%ED%8A%B8-%EA%B0%9C%EC%9A%94--%EB%93%80%EC%96%BC-silo-%EC%A0%84%EB%9E%B5">프로젝트 개요 — 듀얼 Silo 전략</h2>
<p>SSTR2(Somatostatin Receptor Type 2)는 신경내분비종양(NET)에서 과발현되는 GPCR로, DOTATATE/DOTATOC 등 기존 방사성의약품의 타겟입니다. 본 프로젝트는 SST-14(14aa 사이클릭 펩타이드)를 출발 스캐폴드로, AI Co-Scientist 파이프라인을 통해 <strong>SSTR2 선택적 결합 펩타이드 후보를 대규모로 스크리닝</strong>하는 것을 목표로 합니다.</p>
<p>이를 위해 **두 가지 상호보완적 접근법(Silo)**을 병렬 운영합니다:</p>
<table>
<thead>
<tr>
<th style="text-align:center"></th>
<th><strong>Silo A</strong> — De novo 설계</th>
<th><strong>Silo B</strong> — SST-14 변이 탐색</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center"><strong>전략</strong></td>
<td>백본부터 새로 설계 (3-Arm)</td>
<td>기존 SST-14의 8잔기 변이</td>
</tr>
<tr>
<td style="text-align:center"><strong>모델</strong></td>
<td>RFdiffusion → ProteinMPNN → ESMFold</td>
<td>Thompson Sampling + BLOSUM62</td>
</tr>
<tr>
<td style="text-align:center"><strong>도킹</strong></td>
<td>DiffDock / Boltz2 / DiffPepBuilder</td>
<td>FlexPepDock (PyRosetta)</td>
</tr>
<tr>
<td style="text-align:center"><strong>QC</strong></td>
<td>pLDDT + dock confidence</td>
<td>ddG + clash + 5대 구조 규칙</td>
</tr>
<tr>
<td style="text-align:center"><strong>최적화</strong></td>
<td>Grid search</td>
<td>Bayesian Bandit + BO</td>
</tr>
<tr>
<td style="text-align:center"><strong>처리량</strong></td>
<td>API 제한적</td>
<td>~240 candidates/hr</td>
</tr>
<tr>
<td style="text-align:center"><strong>현재 상태</strong></td>
<td>설계 단계 (NIM→로컬 전환 중)</td>
<td><strong>운영 중</strong> (10-iter 완료)</td>
</tr>
</tbody>
</table>
<blockquote>
<p>Silo A는 **새로운 접힘(fold)**을, Silo B는 **서열 변이(sequence variant)**를 탐색합니다. 공유 QC 게이트와 약리학 검증으로 일관성을 보장합니다.</p>
</blockquote>
</section>

<h2 id="%EA%B8%B0%EC%88%A0-%EC%8A%A4%ED%83%9D--%EB%AA%A8%EB%8D%B8%EB%9D%BC%EC%9D%B4%EB%B8%8C%EB%9F%AC%EB%A6%AC%EB%AA%A9%EC%A0%81-%EC%B4%9D%EA%B4%84">기술 스택 — 모델·라이브러리·목적 총괄</h2>
<p>본 파이프라인에서 사용하는 모든 컴퓨팅 도구를 단계별로 정리합니다. 서버에서는 NIM Cloud API를 로컬 GPU로 전환 완료했으며, 연구실 PC에서는 전환 진행 중입니다.</p>
<table>
<thead>
<tr>
<th style="text-align:center">단계</th>
<th>모델 / 라이브러리</th>
<th>목적</th>
<th>입력 → 출력</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center">Step01</td>
<td><strong>OpenFold3</strong></td>
<td>수용체 구조 예측</td>
<td>서열 → mmCIF 3D 구조</td>
</tr>
<tr>
<td style="text-align:center">Step02</td>
<td><strong>RFdiffusion</strong></td>
<td>바인더 백본 설계</td>
<td>수용체 PDB + hotspot → 펩타이드 백본</td>
</tr>
<tr>
<td style="text-align:center">Step03</td>
<td><strong>ProteinMPNN</strong></td>
<td>역폴딩 (서열 설계)</td>
<td>백본 PDB → 아미노산 서열</td>
</tr>
<tr>
<td style="text-align:center">Step03b</td>
<td><strong>BLOSUM62</strong></td>
<td>보존적 돌연변이 (Silo B)</td>
<td>참조 서열 → 변이체</td>
</tr>
<tr>
<td style="text-align:center">Step04</td>
<td><strong>ESMFold</strong></td>
<td>구조 QC (pLDDT)</td>
<td>서열 → 3D 구조 + 신뢰도</td>
</tr>
<tr>
<td style="text-align:center">Step05</td>
<td><strong>Boltz2 / DiffPepBuilder</strong></td>
<td>단백질-펩타이드 도킹</td>
<td>수용체 + 펩타이드 → 복합체</td>
</tr>
<tr>
<td style="text-align:center">Step05b</td>
<td><strong>PyRosetta FlexPepDock</strong></td>
<td>선택성 스크리닝</td>
<td>펩타이드 × SSTR1~5 → ddG</td>
</tr>
<tr>
<td style="text-align:center">Step06</td>
<td><strong>PyRosetta</strong></td>
<td>에너지 정제 + ddG</td>
<td>복합체 PDB → 결합 에너지</td>
</tr>
<tr>
<td style="text-align:center">Step07</td>
<td><strong>FoldMason / PyMOL</strong></td>
<td>구조 비교 + 시각화</td>
<td>PDB → lDDT + 렌더링</td>
</tr>
<tr>
<td style="text-align:center">스코어링</td>
<td><strong>GNINA v1.3.2</strong></td>
<td>CNN 재점수화</td>
<td>PDB → CNN score + Vina</td>
</tr>
<tr>
<td style="text-align:center">스코어링</td>
<td><strong>pymoo (NSGA-II)</strong></td>
<td>Pareto 다목적 최적화</td>
<td>4목적 → 프론트 + 거리</td>
</tr>
<tr>
<td style="text-align:center">스코어링</td>
<td><strong>BoTorch / GP</strong></td>
<td>Bayesian Optimization</td>
<td>관측 → 다음 후보 제안</td>
</tr>
<tr>
<td style="text-align:center">약리</td>
<td><strong>pharma_properties.py</strong></td>
<td>15개 물리화학 메서드</td>
<td>서열 → GRAVY, pI, MW, ...</td>
</tr>
<tr>
<td style="text-align:center">ADMET</td>
<td><strong>pepADMET</strong> (계획)</td>
<td>펩타이드 독성/반감기</td>
<td>서열+SMILES → 19 endpoint</td>
</tr>
<tr>
<td style="text-align:center">LLM</td>
<td><strong>Ollama (qwen3:8b)</strong></td>
<td>에이전트 추론</td>
<td>맥락 → 가설/피드백</td>
</tr>
<tr>
<td style="text-align:center">프론트</td>
<td><strong>React 19 + TypeScript</strong></td>
<td>실시간 대시보드</td>
<td>API 폴링 → 시각화</td>
</tr>
<tr>
<td style="text-align:center">CI/CD</td>
<td><strong>GitHub Actions</strong></td>
<td>7 job 자동화</td>
<td>push → lint/test/build</td>
</tr>
</tbody>
</table>
</section>

<h2 id="5-agent-%EC%97%90%EC%9D%B4%EC%A0%84%ED%8A%B8-%EC%8B%9C%EC%8A%A4%ED%85%9C">5-Agent 에이전트 시스템</h2>
<p>파이프라인은 5개 에이전트가 각 반복(iteration)마다 역할을 수행하며 협업합니다. Planner가 가설을 세우고, QC&amp;Ranker가 걸러내고, Critic이 피드백하는 <strong>과학적 방법론 루프</strong>를 구현합니다.</p>
<table>
<thead>
<tr>

<th style="text-align:center">유형</th>
<th>역할</th>
<th>호출 시점</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Planner</strong></td>
<td style="text-align:center">LLM</td>
<td>가설 생성, 돌연변이 전략, 파라미터 제안</td>
<td>반복 시작</td>
</tr>
<tr>
<td><strong>QC &amp; Ranker</strong></td>
<td style="text-align:center">Code</td>
<td>게이트 적용 (pLDDT, ddG, clash), 순위 매김</td>
<td>Step04~06 후</td>
</tr>
<tr>
<td><strong>DiversityMgr</strong></td>
<td style="text-align:center">Code</td>
<td>중복 서열 제거, 구조 다양성 확보</td>
<td>순위 후</td>
</tr>
<tr>
<td><strong>Critic</strong></td>
<td style="text-align:center">LLM</td>
<td>실패 원인 분석, 다음 반복 파라미터 조정 제안</td>
<td>반복 종료 전</td>
</tr>
<tr>
<td><strong>Reporter</strong></td>
<td style="text-align:center">LLM</td>
<td>시각화 생성, 순위표 작성, 반복 보고서</td>
<td>반복 종료</td>
</tr>
</tbody>
</table>
<blockquote>
<p>현재 Critic은 5/18 메트릭만 참조 중 → <strong>19개 실패 유형으로 확장</strong> 및 <strong>긍정 피드백 루프</strong>(성공 패턴 → Planner bias) 제안이 서버 발표자료에 포함되어 있습니다.</p>

<h2 id="%EC%99%9C-%EC%A0%84%EC%B2%B4-%EC%99%84%EB%A3%8C%EC%9C%A8%EC%9D%B4-68%EC%9D%B8%EA%B0%80">왜 전체 완료율이 68%인가</h2>
<p>전체 68% 완료율의 구성 원인을 파악하는 것이 중요합니다. <strong>코드가 완성된 항목(<img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> 코드완료)과 네트워크 의존 항목은 &quot;미완료&quot;로 집계되지만, 실제 알고리즘 개발 작업은 대부분 완료</strong>된 상태입니다. 반면 C(ADMET, 13%)가 낮은 이유는 원본 도구 6종 모두가 소분자 전용으로 판명되어 새 전략 수립에 시간이 소요된 때문이며, pepADMET로의 전환 방향은 확정되었습니다.</p>
<div class="res">
<p><strong>핵심 파이프라인 완료율</strong>: A(리팩토링) + F(RCSB PDB) = <strong>100%</strong> — 파이프라인 뼈대는 완전히 동작합니다.</p>
</div>
<div class="blk">
<p><strong>주요 블로커 3가지</strong>: ① PyTorch 모델 23GB 다운로드(테더링 환경) ② SSTR1/3/4/5 AlphaFold API 접근 ③ pepADMET DGL 환경 구축</p>
</div>
<ul>
<li><strong>A카테고리(100%)</strong>: 22개 리팩토링 항목 모두 완료, Sprint 1~3 전부 처리</li>
<li><strong>B카테고리(40%)</strong>: 핵심 P0 버그 16건은 수정 완료, 기능 확장 6건 잔여</li>
<li><strong>E카테고리(38%)</strong>: GNINA 로컬 실행은 확보, PyTorch 기반 3개 모델 대기 중</li>
<li><strong>G카테고리(80%)</strong>: CI 7 job 중 NIM smoke test만 <code>continue-on-error=true</code>로 처리</li>
</ul>

<h2 id="a-01a-10-%EC%B4%9D%EA%B4%84-12--%EC%9B%90%EB%B3%B8-%EC%A7%80%EC%8B%9C--%ED%8C%90%EB%8B%A8">A-01~A-10 총괄 (1/2) — 원본 지시 &amp; 판단</h2>
<p>아래 표는 박사님이 2차 미팅(2026-02-12)에서 제시한 10개 액션 아이템 각각에 대해 AI팀이 내린 판단과 그 이유를 정리한 것입니다. &quot;판단&quot; 열의 표현이 원본 도구와 다를 경우, 이는 해당 도구가 SST-14에 직접 적용 불가하다는 근거가 있어 <strong>동등 이상의 기능을 자체 구현하거나 대안 도구로 대체</strong>했음을 의미합니다.</p>
<table>
<thead>
<tr>
<th style="text-align:center">ID</th>
<th>박사님 원본 지시</th>
<th style="text-align:center">기한</th>
<th>판단 요약</th>
<th style="text-align:center">상태</th>
</tr>

<td style="text-align:center">2주</td>
<td>PepCalc <strong>API 부재 + SS bond 미지원</strong> → 자체 15메서드 구현</td>
<td style="text-align:center"><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></td>
</tr>
<tr>
<td style="text-align:center"><strong>A-02</strong></td>

<td style="text-align:center">2주</td>
<td>소분자 6종 <strong>AD 범위 초과</strong> → pepADMET 대안 확보</td>
<td style="text-align:center"><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/></td>
</tr>

<td style="text-align:center"><strong>A-03</strong></td>
<td>SSTR1/3/4/5 <strong>AlphaFold 구조</strong> + 선택성 도킹</td>
<td style="text-align:center">2주</td>
<td>코드 <strong>전부 구현</strong> 완료, 네트워크 차단으로 PDB 미다운로드</td>
<td style="text-align:center"><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/></td>
</tr>
<tr>

<td>Critic Agent에 <strong>ClusterReport A~E</strong> 추가</td>
<td style="text-align:center">1개월</td>
<td><code>classify_cluster()</code> <strong>57 tests</strong> 완전 구현</td>
<td style="text-align:center"><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></td>
</tr>
<tr>

<td style="text-align:center">1개월</td>
<td>BO+Pareto+GNINA <strong>3모듈</strong> 구현, runner 통합 1단계 잔여</td>
<td style="text-align:center"><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></td>

</ul>

<h2 id="a-01-pepcalc%EC%9D%B4-%EC%99%9C-%EB%B6%80%EC%A0%81%ED%95%A9%ED%95%9C%EA%B0%80">A-01: PepCalc이 왜 부적합한가</h2>
<div class="req">
<p><strong>원본 지시</strong>: &quot;PepCalc/PeptideCutter를 AI 파이프라인 Step 8에 통합하고, SST-14 변형체의 혈청 반감기(t½) 예측값을 일괄 산출할 것&quot;</p>
</div>
<p>PepCalc을 채택하지 않은 이유는 단순히 대안이 더 좋아서가 아니라, <strong>PepCalc이 구조적으로 이번 파이프라인에 통합 자체가 불가능하기 때문</strong>입니다. PepCalc은 웹 인터페이스만 제공하며 프로그래밍 방식의 REST API가 전혀 존재하지 않아, 22,000개 후보를 자동 처리하려면 브라우저 자동화(Selenium)를 써야 하는데 이는 서버 정책 위반이자 비효율입니다. 또한 SST-14의 Cys3-Cys14 이황화 결합(disulfide bond)을 고려하는 파라미터가 없어, 순환 펩타이드의 물리화학적 특성을 정확히 계산할 수 없습니다.</p>

<h2 id="a-01-15%EA%B0%9C-%EB%A9%94%EC%84%9C%EB%93%9C--%EB%AC%B8%ED%97%8C-%EA%B7%BC%EA%B1%B0-%EC%A0%84%EC%88%98">A-01: 15개 메서드 — 문헌 근거 전수</h2>
<p>아래 표는 <code>pharma_properties.py</code>에 구현된 15개 메서드 각각의 원본 논문 근거입니다. 이 방식의 핵심 강점은 <strong>모든 계산이 특정 연구자의 주관적 설정 없이 1982년~1998년 사이에 발표된 검증된 문헌에 정확히 기반</strong>한다는 점입니다. 특히 ★ 표시된 MW(분자량)와 Radiolysis(방사선분해 감수성)는 원본 지시에 없었으나 방사성의약품 QC에 필수적이라 판단하여 이번에 신규 추가했습니다.</p>

<h2 id="a-01-diwv-%EB%B2%84%EA%B7%B8-%EB%B0%9C%EA%B2%AC-%EA%B3%BC%EC%A0%95--%EC%A0%84%EC%88%98-%EB%8C%80%EC%A1%B0-%EA%B2%80%EC%A6%9D">A-01: DIWV 버그 발견 과정 — 전수 대조 검증</h2>
<p><code>pharma_properties.py</code>의 신뢰성을 확보하기 위해 <code>peptides</code> v0.5.0 라이브러리를 Ground Truth로 채택하여 400개 다이펩타이드(DIWV 테이블 전체)를 일대일 대조하는 방식으로 검증을 수행했습니다. 이 과정에서 <strong>단순한 copy-paste 전사 오류로 인한 16건의 수치 버그</strong>가 발견되었습니다. 특히 RR 다이펩타이드의 경우 오류 전 값이 -6.54였으나 실제 값은 +58.28로, <strong>부호와 크기 모두 완전히 틀린</strong> 상태였습니다. SST-14 서열에 RR/MM/YT가 포함되지 않아 기존 35개 테스트로는 이 오류가 탐지되지 않았다는 점이 더욱 중요합니다.</p>

<h2 id="a-01-ss-bond-pi-%EB%B3%B4%EC%A0%95--%EC%8B%A0%EC%9E%A5-%ED%81%B4%EB%A6%AC%EC%96%B4%EB%9F%B0%EC%8A%A4-%EC%A7%81%EA%B2%B0">A-01: SS bond pI 보정 — 신장 클리어런스 직결</h2>
<p>Cys3-Cys14 이황화 결합이 형성되면 두 Cys 잔기의 thiol기(pKa 8.18)가 이온화에 참여하지 못합니다. 기존 계산 방식은 이를 고려하지 않아 pI를 과소 평가했으며, 이를 Henderson-Hasselbalch 공식에서 해당 잔기를 제외하는 방식으로 보정했습니다. <strong>pI 보정은 신장 클리어런스 예측에 직결</strong>됩니다. 일반적으로 방사성의약품은 pI가 낮을수록 신장에서 재흡수가 억제되어 신독성이 낮아지므로, 보정된 pI 10.62는 Octreo 계열과 비교 시 신장 흡수가 더 높을 수 있음을 시사합니다.</p>
<h3 id="_charge_at_phsequence-ph-ss_bond_cysteines-%EB%B3%B4%EC%A0%95-%EB%A1%9C%EC%A7%81"><code>_charge_at_ph(sequence, ph, ss_bond_cysteines=)</code> 보정 로직</h3>
<p>SS bond 형성 Cys의 <strong>thiol기(pKa 8.18) 비이온화</strong> → Henderson-Hasselbalch 계산에서 제외<br />
<code>ss_bond_cysteines={2, 13}</code> (0-indexed) → Cys3(pos 2), Cys14(pos 13) 이온화 차단</p>

<h2 id="a-02-%EC%86%8C%EB%B6%84%EC%9E%90-admet-6%EC%A2%85--%EA%B0%9C%EB%B3%84-%EB%B6%80%EC%A0%81%ED%95%A9-%EC%82%AC%EC%9C%A0">A-02: 소분자 ADMET 6종 — 개별 부적합 사유</h2>
<div class="req">
<p><strong>원본 지시</strong>: &quot;ADMETlab 3.0 API를 활용하여 상위 21개 후보에 대한 ADMET 프로파일 21건을 일괄 생성할 것&quot;</p>

<p>6종 ADMET 도구가 모두 부적합 판정을 받은 것은 우연이 아닙니다. <strong>이 도구들의 공통된 근본 문제는 MW &lt; 500 Da인 소분자를 대상으로 훈련되었다는 점</strong>입니다. SST-14는 MW ~ 1,600 Da로 이 범위의 3배 이상이며, 간 CYP450 대사를 기준으로 설계된 소분자 ADMET 모델은 프로테아제 분해를 통해 대사되는 펩타이드에 메커니즘적으로 적용될 수 없습니다. 또한 ADMETlab 3.0은 2026년 3월 기준 TLS 인증서가 만료되어 서버 접속 자체가 불가능한 상태입니다.</p>

<h2 id="a-09-pepadmet--%ED%8E%A9%ED%83%80%EC%9D%B4%EB%93%9C-%EC%A0%84%EC%9A%A9-admet%EC%9D%98-%EC%9C%A0%EC%9D%BC-%EB%8C%80%EC%95%88">A-09: pepADMET — 펩타이드 전용 ADMET의 유일 대안</h2>
<div class="res">
<p><strong>원본 지시</strong>: &quot;김민규 교수팀 JCIM 논문을 검토하여 파이프라인에 적용할 항목을 정리할 것&quot;<br />
<strong>결과</strong>: pepADMET (JCIM 2026, 66, 936-946) 분석 완료 — <strong>36,643개 펩타이드</strong> 학습, 19 ADMET endpoint 지원</p>
</div>
<p>pepADMET이 유일한 대안인 이유는, 현재까지 알려진 ADMET 예측 도구 중 <strong>펩타이드(2-50aa)를 훈련 데이터로 사용한 것이 pepADMET 뿐이기 때문</strong>입니다. 특히 Desmopressin(9aa, Cys1-Cys6 이황화 결합 보유)을 검증 케이스로 사용하여 SS bond가 있는 환형 펩타이드도 처리 가능함을 확인했습니다. SST-14는 구조적으로 Desmopressin과 유사(14aa, Cys3-Cys14)하므로 pepADMET 적용 가능성이 가장 높습니다.</p>

<h2 id="a-09-pepadmet--case-study-3%EA%B1%B4-%EA%B2%80%EC%A6%9D-%EA%B2%B0%EA%B3%BC">A-09: pepADMET — Case Study 3건 검증 결과</h2>
<p>pepADMET의 예측 신뢰성을 판단하기 위해 SS bond 보유 펩타이드(Desmopressin), 환형 펩타이드(Cyclosporine), 선형 펩타이드(Leuprolide) 총 3가지 구조 유형에 대해 실험값과 비교 검증을 수행했습니다. <strong>Leuprolide(선형)는 오차 2%로 거의 완벽</strong>하며, Desmopressin(SS bond)도 18% 오차로 실용 범위 내에 있습니다. Cyclosporine의 35% 오차는 환형 특성 특유의 입체 구조를 완전히 반영하지 못한 것으로 해석되며, SST-14에는 Desmopressin 케이스가 더 적합한 참조입니다.</p>

<thead>

<th>펩타이드</th>
<th>특성</th>

<th style="text-align:center">T½ 예측값</th>
<th style="text-align:center">오차</th>
<th style="text-align:center">Toxicity</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Desmopressin</strong> (9aa)</td>
<td>Cys1-Cys6 이황화 결합</td>
<td style="text-align:center">3.00 h</td>
<td style="text-align:center">2.46 h</td>
<td style="text-align:center">18%</td>
<td style="text-align:center">Toxic <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></td>
</tr>
<tr>
<td>Cyclosporine (11aa)</td>
<td>완전 환형 펩타이드</td>
<td style="text-align:center">19.00 h</td>
<td style="text-align:center">12.28 h</td>
<td style="text-align:center">35%</td>
<td style="text-align:center">Non-toxic <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></td>
</tr>

<td>선형 합성 펩타이드</td>
<td style="text-align:center">3.00 h</td>
<td style="text-align:center">2.95 h</td>
<td style="text-align:center"><strong>2%</strong></td>
<td style="text-align:center">Non-toxic <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></td>
</tr>
</tbody>
</table>
<blockquote>
<p>SST-14 (14aa, Cys3-Cys14 SS bond) → Desmopressin과 구조 유사 → pepADMET 적용 가능성 높음, 예측 오차 18% 내외 예상</p>
</blockquote>
<div class="res">
<p><strong>결론</strong>: 소분자 ADMET 6종이 전부 부적합 판정을 받은 상황에서, pepADMET은 현재 시점에서 구조적으로 적합한 <strong>유일한 검증된 대안</strong>입니다.</p>

<h2 id="a-03-cif%E2%86%92pdb-%EB%B3%80%ED%99%98-%ED%9D%90%EB%A6%84--%EA%B5%AC%ED%98%84-%ED%95%AD%EB%AA%A9-%EC%A0%84%EC%B2%B4">A-03: CIF→PDB 변환 흐름 + 구현 항목 전체</h2>
<div class="req">
<p><strong>원본 지시</strong>: &quot;SSTR1/3/4/5 AlphaFold 구조를 다운로드하고, 선택성 도킹 프로토콜을 구성하며, SSTR2 선택성 스크리닝 파이프라인에 연결할 것&quot;</p>
</div>
<p>AlphaFold EBI API에서 최신 모델 버전을 자동 감지하고, CIF(Crystallographic Information File) 형식으로 다운로드한 뒤 BioPython의 <code>MMCIFParser</code>로 파싱하여 PDB 형식으로 변환합니다. CIF 형식을 그대로 PyRosetta에 공급하면 원자 순서 및 chain 인식 오류가 발생하기 때문에 <strong>반드시 PDB 변환이 필요</strong>합니다. 변환 후 PyRosetta의 <code>FlexPepDockingProtocol</code>로 오프-타겟 도킹을 수행하여 SSTR2 대비 결합 선호도를 정량 비교합니다.</p>
<table>
<thead>
<tr>
<th>구현 항목</th>
<th>상세 설명</th>
<th>코드 위치</th>
</tr>
</thead>
<tbody>
<tr>
<td>오프-타겟 4종</td>
<td>SSTR1(<strong>P30872</strong>), SSTR3(<strong>P32745</strong>), SSTR4(<strong>P31391</strong>), SSTR5(<strong>P35346</strong>) UniProt ID</td>
<td><code>pipeline_config.yaml</code></td>
</tr>
<tr>
<td>AlphaFold 다운로드</td>
<td><code>download_alphafold_structure()</code> — 최신 버전 자동 감지, 3회 재시도, 실패 시 Estimation 모드 폴백</td>
<td><code>download_alphafold.py</code></td>
</tr>
<tr>
<td><strong>CIF → PDB 변환</strong></td>
<td>BioPython <code>MMCIFParser</code> → <code>PDBIO</code> 저장, chain ID 정규화 포함</td>
<td><code>cif_to_pdb.py</code></td>
</tr>
<tr>
<td>Production 도킹</td>
<td>PyRosetta FlexPepDock — CA superposition → 키메릭 PDB 조립 → ddG 계산</td>
<td><code>offtarget_dock.py</code></td>
</tr>
<tr>
<td>Estimation 모드</td>
<td>PDB 없을 때 가우시안 노이즈 폴백 <code>N(μ=2.0, σ=1.0)</code> — 파이프라인 중단 방지</td>
<td><code>dock_against_offtarget()</code></td>
</tr>
<tr>
<td>선택성 마진 계산</td>
<td><code>margin = SSTR2_ddG - worst_offtarget_ddG</code></td>
<td><code>compute_selectivity_margin()</code></td>
</tr>
<tr>
<td>선택성 게이트</td>
<td><code>margin ≤ -10.0</code> <strong>AND</strong> <code>worst ≥ -15.0</code> (AND 로직)</td>
<td><code>apply_selectivity_gate()</code></td>
</tr>
</tbody>
</table>
<div class="blk">
<p><strong>블로커</strong>: SSTR1/3/4/5 AlphaFold PDB 미다운로드 (연구실 네트워크 필요) → 도킹 미실행 → selectivity margin 결과 미생성. 코드 로직 자체는 완전 구현 상태이며, PDB 파일만 확보되면 즉시 실행 가능합니다.</p>
</div>
</section>

<h2 id="a-03-production-vs-estimation-%EB%AA%A8%EB%93%9C--6%EB%8B%A8%EA%B3%84-%EB%8F%84%ED%82%B9-%ED%9D%90%EB%A6%84">A-03: Production vs Estimation 모드 + 6단계 도킹 흐름</h2>
<p>Production 모드와 Estimation 모드의 구분은 <strong>파이프라인의 견고성(robustness)을 위한 설계 결정</strong>입니다. AlphaFold API 접근이 불가한 환경(연구실 테더링, API 일시 다운)에서도 파이프라인이 중단 없이 진행될 수 있도록, PDB가 없을 때는 통계적 분포(정규 분포)에서 샘플링한 추정값으로 대체합니다. 이 추정값은 &quot;근사 결과&quot;임을 로그에 명시하고, Production 실행 후 반드시 교체됩니다.</p>
<h3 id="production-%EB%AA%A8%EB%93%9C--6%EB%8B%A8%EA%B3%84-%EB%8F%84%ED%82%B9-%ED%9D%90%EB%A6%84">Production 모드 — 6단계 도킹 흐름</h3>
<table>
<thead>
<tr>
<th style="text-align:center">순서</th>
<th>단계</th>
<th>상세 설명</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center">①</td>
<td>SSTR2 복합체 로드</td>
<td>펩타이드(≤20aa)와 수용체(~370aa)를 chain 기준으로 자동 분리</td>
</tr>
<tr>
<td style="text-align:center">②</td>
<td>오프-타겟 로드</td>
<td>AlphaFold PDB 파일 로드 (<code>AF-P30872-F1-model_v4.pdb</code> 등)</td>
</tr>
<tr>
<td style="text-align:center">③</td>
<td><strong>CA 구조 정렬</strong></td>
<td><code>superimpose_pose_on_subset_CA()</code> — SSTR2 수용체 기준으로 오프-타겟 정렬</td>
</tr>
<tr>
<td style="text-align:center">④</td>
<td><strong>키메릭 PDB 조립</strong></td>
<td>offtarget receptor(chain B) + 원래 peptide(chain A)를 합성하여 새 PDB 생성</td>
</tr>
<tr>
<td style="text-align:center">⑤</td>
<td>FlexPepDock 정제</td>
<td><code>FlexPepDockingProtocol</code> 실행, backbone+sidechain 유연성 허용</td>
</tr>
<tr>
<td style="text-align:center">⑥</td>
<td><strong>ddG 계산</strong></td>
<td><code>InterfaceAnalyzerMover</code> → kcal/mol + clash_score 반환</td>
</tr>
</tbody>
</table>

<h2 id="a-03-selectivity_margin-%EC%95%8C%EA%B3%A0%EB%A6%AC%EC%A6%98--%EA%B3%B5%EC%8B%9D--%EC%98%88%EC%8B%9C">A-03: selectivity_margin 알고리즘 — 공식 + 예시</h2>
<p><code>selectivity_margin</code>은 <strong>&quot;SSTR2에 얼마나 선택적으로 결합하는가&quot;를 수치화한 지표</strong>입니다. 값이 음수일수록 SSTR2 결합력이 오프-타겟보다 강함을 의미합니다. AND 로직을 사용하는 이유는 SSTR2 결합이 강하더라도 오프-타겟 결합 자체가 너무 강하면 부작용 위험이 있기 때문입니다. 예를 들어 bb00_03 후보는 SSTR2 결합이 가장 강하지만(-22.0), SSTR1이 -10.0으로 오프-타겟 결합도 강해 게이트에서 탈락합니다.</p>

<h2 id="a-04-ae-%ED%81%B4%EB%9F%AC%EC%8A%A4%ED%84%B0--%EA%B0%81-%ED%81%B4%EB%9F%AC%EC%8A%A4%ED%84%B0%EC%9D%98-%EC%95%BD%ED%95%99%EC%A0%81-%EB%AA%A9%EC%A0%81">A-04: A~E 클러스터 — 각 클러스터의 약학적 목적</h2>
<div class="req">
<p><strong>원본 지시</strong>: &quot;Critic Agent에 ClusterReport (A~E 분류) 기능을 추가할 것&quot;</p>
</div>
<p>클러스터 A~E 설계의 핵심 원칙은 **&quot;단일 최적 기준 없이, 목적에 따라 다른 최적 후보를 선별한다&quot;**는 것입니다. 예를 들어 클러스터 A는 도킹 점수 최우선 후보를, 클러스터 D는 방사성의약품 합성에 유리한 물리화학적 특성을 가진 후보를 선별합니다. 이 계층 분류를 통해 Critic 에이전트는 각 클러스터에 맞는 다음 iteration 전략을 다르게 적용할 수 있습니다.</p>
<table>
<thead>
<tr>
<th style="text-align:center">클러스터</th>
<th>유형</th>
<th>약학적 목적</th>
<th>선별 기준 (모두 AND)</th>
<th style="text-align:center">우선순위</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center"><strong>A</strong></td>
<td>결합 엘리트</td>
<td>SSTR2 도킹 점수가 가장 우수한 후보 — 친화도 최우선</td>
<td>ddG ≤ <strong>-8.0</strong> + clash ≤ <strong>5.0</strong> + pLDDT ≥ <strong>75.0</strong> + <strong>FWKT 접촉</strong></td>
<td style="text-align:center">1</td>
</tr>
<tr>
<td style="text-align:center"><strong>B</strong></td>
<td>선택성 특화</td>
<td>SSTR2 외 다른 SSTR 아형에 결합이 약한 후보 — 부작용 최소화</td>
<td>selectivity_margin ≥ <strong>3.0</strong> + ddG &lt; <strong>-5.0</strong></td>
<td style="text-align:center">2</td>
</tr>
<tr>
<td style="text-align:center"><strong>C</strong></td>
<td>안정성 강화</td>
<td>혈중 안정성이 높고 프로테아제 분해에 저항성인 후보 — 반감기 연장</td>
<td>Instability Index &lt; <strong>30.0</strong> + BLOSUM62 ≥ <strong>0</strong> + protease sites ≤ <strong>9</strong></td>
<td style="text-align:center">3</td>
</tr>
<tr>
<td style="text-align:center"><strong>D</strong></td>
<td>방사화학 최적</td>
<td>⁶⁸Ga/¹⁷⁷Lu 표지 및 정제에 유리한 물리화학적 특성 보유</td>
<td>GRAVY ∈ <strong>[-1.0, +0.5]</strong> + |charge| ≤ <strong>1.0</strong> + n_strong ≥ <strong>1</strong></td>
<td style="text-align:center">4</td>
</tr>
<tr>
<td style="text-align:center"><strong>E</strong></td>
<td>탐색 후보</td>
<td>A~D 기준 미충족이지만 탐색 가치가 있는 후보 (폴백)</td>
<td>A~D 미충족 자동 배정</td>
<td style="text-align:center">5</td>
</tr>
</tbody>
</table>
<p>클러스터 우선순위가 1인 A가 가장 먼저 평가되며, A 조건을 충족하면 B~E는 평가하지 않습니다. 이 <strong>계층적(hierarchical) 구조</strong>는 Critic 에이전트가 &quot;이 후보는 A이므로 결합 강화 방향으로 mutation을 지속&quot;하는 식의 명확한 다음 행동 지침을 도출할 수 있게 합니다.</p>
</section>

<h2 id="a-04-classify_cluster--critic-%EC%97%90%EC%9D%B4%EC%A0%84%ED%8A%B8-%EC%97%B0%EB%8F%99">A-04: <code>classify_cluster()</code> — Critic 에이전트 연동</h2>
<p><code>classify_cluster()</code> 함수는 단일 후보의 클러스터를 반환하고, <code>batch_classify()</code>는 전체 후보군에 대한 분류 결과와 클러스터별 통계를 동시에 반환합니다. Critic 에이전트는 클러스터 정보를 바탕으로 다음 mutation iteration의 방향을 동적으로 조정합니다. 예를 들어 <code>poor_selectivity</code> 피드백이 발생하면 SSTR2 결합부위의 hotspot constraint를 강화하고, 클러스터 B 기준을 목표로 재설계합니다.</p>
<h3 id="critic-%EC%97%90%EC%9D%B4%EC%A0%84%ED%8A%B8-%ED%94%BC%EB%93%9C%EB%B0%B1-%EB%A3%A8%ED%94%84">Critic 에이전트 피드백 루프</h3>
<ul>
<li><strong>A 클러스터 달성 시</strong>: 현재 mutation 방향 유지, FWKT 접촉 강화 집중</li>
<li><strong>B 클러스터 미달 시</strong>: <code>poor_selectivity</code> 피드백 → hotspot constraint 강화</li>
<li><strong>C 클러스터 미달 시</strong>: <code>instability_high</code> 피드백 → 불안정 잔기(D, E 등) 치환 제안</li>
<li><strong>D 클러스터 미달 시</strong>: <code>radio_chem_unfavorable</code> → GRAVY/charge 조정 mutation 제안</li>
<li><strong>E 클러스터 배정 시</strong>: 다양성 확보 목적으로 탐색 유지, 50 iteration 내 재분류 시도</li>
</ul>

<h2 id="a-05-%EA%B8%B0%EC%A1%B4-%EA%B0%80%EC%A4%91%ED%95%A9%EC%9D%98-%EB%AC%B8%EC%A0%9C%EC%A0%90">A-05: 기존 가중합의 문제점</h2>
<div class="req">
<p><strong>원본 지시</strong>: &quot;BLOSUM62 Tier 1 / 물리화학 필터 Tier 2 / 비제한 Tier 3 병렬 후보 생성 Step 3B 재설계&quot;</p>
</div>
<p>기존 가중합 방식(0.45/0.20/0.15/0.10)의 근본적 문제는 <strong>가중치가 연구자의 주관적 판단에 의존</strong>한다는 점입니다. ddG가 단위 차이로 10배 차이나더라도 고정 가중치 하에서는 그 차이가 선형으로만 반영됩니다. 또한 한 지표가 극단값을 가질 경우 다른 지표들이 희석되는 아웃라이어 민감성 문제가 있습니다. <strong>신규 4단계 체인은 이 두 문제를 모두 해결</strong>합니다. ECR(Exponential Cumulative Rank)은 순위 기반 합의로 아웃라이어를 억제하고, Pareto 프론트는 어떤 목적도 가중치 없이 공정하게 처리합니다.</p>

<h2 id="a-05-4%EB%8B%A8%EA%B3%84-%EC%B2%B4%EC%9D%B8--%EA%B0%81-%EB%AA%A8%EB%93%88%EC%9D%98-%EC%97%AD%ED%95%A0">A-05: 4단계 체인 — 각 모듈의 역할</h2>
<p>4단계 체인은 순차적으로 실행되며, 각 단계의 출력이 다음 단계의 입력이 됩니다. GNINA가 물리 기반 도킹 재점수를 제공하고, ECR이 3종 스코어를 합의 점수로 집약하며, NSGA-II Pareto가 다목적 비지배 프론트를 구성하고, 마지막으로 BO가 GP 서로게이트를 학습하여 다음 iteration에서 탐색할 mutation을 능동적으로 제안합니다.</p>

</tr>
<tr>

<td>ECR consensus</td>

<td>3종 score → 단일 ecr_score</td>
<td style="text-align:center">—</td>
</tr>
<tr>
<td style="text-align:center">③</td>
<td><code>pareto_ranking.py</code></td>
<td>NSGA-II (pymoo) + crowding distance</td>

<td style="text-align:center">9</td>
</tr>

<p>방사성의약품에서 방사선분해(radiolysis)는 방사성 동위원소가 붕괴할 때 발생하는 에너지(β 입자, γ선 등)가 인접 분자의 화학 결합을 파괴하는 현상입니다. <strong>Trp(W)의 indole ring은 방사선에 의해 kynurenine으로 산화되는 반응이 타 아미노산 대비 6배 이상 빠릅니다.</strong> W8은 FWKT 약리단의 핵심 잔기이므로 이것이 산화되면 SSTR2 결합 능력이 직접 손실됩니다. 이것이 W8을 &quot;이중으로 critical한 잔기&quot;로 분류하는 이유입니다.</p>

<h2 id="a-08-metal-coordination--chelator-binding-%EB%B6%84%EC%84%9D">A-08: Metal Coordination + Chelator Binding 분석</h2>
<p><code>analyze_metal_coordination()</code> 함수는 펩타이드 서열을 스캔하여 금속 이온 배위에 참여할 수 있는 잔기를 식별하고, ⁶⁸Ga/¹⁷⁷Lu/²²⁵Ac 각각에 대한 직접 배위 가능성을 판단합니다. Ga³⁺와 Lu³⁺/Ac³⁺는 carboxylate 산소(Asp/Glu)를 통한 배위를 선호하는 반면, Zn²⁺/Cu²⁺는 imidazole(His) 및 thiolate(Cys)를 선호합니다. SST-14 native 서열에는 His, Asp, Glu가 없으므로 Ga³⁺/Lu³⁺ 직접 배위가 불가합니다.</p>

<h2 id="1%EC%B0%A82%EC%B0%A8-%EB%AF%B8%ED%8C%85-31%EA%B1%B4-%EB%8C%80%EC%9D%91-%ED%98%84%ED%99%A9-1">1차·2차 미팅 31건 대응 현황</h2>
<p>2026년 1월(1차)과 2월(2차)에 걸쳐 제기된 총 31건의 요청 사항에 대한 현재 대응 상황입니다. 1차 미팅(MD Agent 아키텍처)의 요청들은 대부분 파이프라인 뼈대로 구현되어 완료 또는 부분 완료 상태입니다. 2차 미팅(25건)은 카테고리별로 완성도 차이가 크며, <strong>추천 도구 5종 중 4종이 미완료</strong>인 것이 눈에 띕니다. 이는 해당 도구들이 외부 서버 의존적이거나 별도 GPU 연산이 필요하기 때문입니다.</p>

<h2 id="%EB%A1%9C%EC%BB%AC-%EB%AA%A8%EB%8D%B8-%EC%A0%84%ED%99%98-%EC%99%9C-nim%EC%97%90%EC%84%9C-%EB%B2%97%EC%96%B4%EB%82%98%EC%95%BC-%ED%95%98%EB%8A%94%EA%B0%80">로컬 모델 전환: 왜 NIM에서 벗어나야 하는가</h2>
<p>NIM(NVIDIA Inference Microservice) Cloud API를 사용하던 방식에서 로컬 온프레미스 모델로 전환하는 결정은 <strong>연구실 환경의 실용적 제약에서 비롯된 것</strong>입니다. 첫째, NIM API는 NGC(NVIDIA GPU Cloud) API 키와 안정적인 인터넷 연결이 필수적인데, 연구실의 테더링 환경에서는 대용량 추론 요청 시 타임아웃이 빈번히 발생합니다. 둘째, 22,000개 후보를 처리하는 배치 작업에서 클라우드 API는 rate limit과 비용 문제가 발생합니다. 셋째, <strong>데이터 보안</strong> 측면에서 미발표 연구 데이터를 외부 서버로 전송하는 것은 바람직하지 않습니다.</p>

<h2 id="%EB%A1%9C%EC%BB%AC-%EC%A0%84%ED%99%98-%ED%9B%84-on-premise-%EC%84%B1%EB%8A%A5-%EB%B9%84%EA%B5%90">로컬 전환 후 On-Premise 성능 비교</h2>
<p>로컬 RTX 4090 (24GB VRAM) 기준으로 NIM 클라우드 대비 ESMFold와 ProteinMPNN은 <strong>3-5배 속도 향상</strong>이 예상됩니다. RFdiffusion은 네트워크 지연이 없어도 연산 자체가 무거워 클라우드와 비슷하거나 로컬이 약간 느릴 수 있습니다. 그러나 <strong>오프라인 가용성과 배치 처리 무제한</strong>이 핵심 이점입니다. FlexPepDock은 NIM API가 아예 없어 로컬만 가능합니다.</p>

<thead>
<tr>
<th>모델</th>
<th style="text-align:center">NIM (클라우드, 네트워크 포함)</th>
<th style="text-align:center">로컬 (RTX 4090)</th>
<th style="text-align:center">개선 비율</th>
</tr>
</thead>
<tbody>
<tr>
<td>ESMFold (14aa 펩타이드)</td>
<td style="text-align:center">2-3초</td>
<td style="text-align:center"><strong>0.5-1초</strong></td>
<td style="text-align:center"><strong>3~5×</strong></td>
</tr>
<tr>
<td>ProteinMPNN (8 시퀀스)</td>
<td style="text-align:center">3-5초</td>
<td style="text-align:center"><strong>1-2초</strong></td>
<td style="text-align:center"><strong>2~3×</strong></td>
</tr>
<tr>
<td>RFdiffusion (1 backbone)</td>
<td style="text-align:center">10-20초</td>
<td style="text-align:center">15-30초</td>
<td style="text-align:center">~동등 (네트워크 없어도 연산 무거움)</td>
</tr>
<tr>
<td>FlexPepDock (1 정제)</td>
<td style="text-align:center">—</td>
<td style="text-align:center">30-60초</td>
<td style="text-align:center"><strong>로컬 전용</strong></td>

<h3 id="basetool-%EC%9D%B8%ED%84%B0%ED%8E%98%EC%9D%B4%EC%8A%A4-%ED%98%B8%ED%99%98%EC%84%B1-%EC%9C%A0%EC%A7%80-%EC%A0%84%EB%9E%B5">BaseTool 인터페이스 호환성 유지 전략</h3>
<p>로컬 전환 시 <strong>호출 코드를 변경하지 않도록</strong> <code>BaseTool</code> 인터페이스를 동일하게 유지합니다. NIM API 방식의 <code>_post_timed()</code> HTTP 호출을 로컬 Python <code>model(**tokens)</code> 직접 호출로 교체하되, 반환 타입(<code>ToolResult</code>)은 동일하게 유지합니다.</p>

</tr>
</thead>

<tr>
<td>호출 방식</td>
<td style="text-align:center"><code>_post_timed()</code> HTTPS REST</td>
<td style="text-align:center">Python <code>model(**tokens)</code> 직접 호출</td>
</tr>
<tr>
<td>API 키 필요</td>

</tr>
<tr>

<td style="text-align:center"><strong>없음</strong></td>
</tr>
<tr>
<td>오프라인 가용</td>
<td style="text-align:center"><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/></td>
<td style="text-align:center"><strong><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></strong></td>
</tr>
