<h1 id="silo-a-arm%EB%B3%84-%EC%83%81%EC%84%B8">Silo A: Arm별 상세</h1>
<div class="columns">
<div class="col">
<h3 id="arm-1--%EC%86%8C%EB%B6%84%EC%9E%90">Arm 1 — 소분자</h3>
<p><strong>MolMIM</strong> 소분자 생성 (QED=0.94) → <strong>DiffDock 블라인드 도킹</strong> → 40후보 중 15개 도킹</p>
<h3 id="arm-2--%ED%8E%A9%ED%83%80%EC%9D%B4%EB%93%9C-%EB%B3%80%EC%9D%B4%EC%B2%B4">Arm 2 — 펩타이드 변이체</h3>
<p><strong>Ala scan</strong>: F6~F11→Ala (결합 기여도 측정)<br />
<strong>강화 변이체</strong>: <code>A1S</code> <code>K4R</code> <code>F6Y</code> <code>K9R</code> <code>F11Y</code> → <strong>13후보</strong></p>
<h3 id="arm-3--de-novo">Arm 3 — De Novo</h3>
<p><strong>RFdiffusion</strong>→<strong>ProteinMPNN</strong>→<strong>ESMFold</strong> (pLDDT=81.4) → <strong>16후보</strong></p>
</div>
<div class="col">
<h3 id="%EC%9A%A9%EC%96%B4-%EC%A0%95%EB%A6%AC">용어 정리</h3>
<table>
<thead>
<tr>
<th>용어</th>
<th>의미</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>블라인드 도킹</strong></td>
<td>결합 부위 미지정, 전체 표면 탐색</td>
</tr>
<tr>
<td><strong>Ala scanning</strong></td>
<td>잔기→Ala 치환으로 기여도 측정</td>
</tr>
<tr>
<td><strong>강화 변이체</strong></td>
<td>보존적 치환으로 결합력 개선</td>
</tr>
<tr>
<td><strong>pLDDT</strong></td>
<td>구조 예측 신뢰도 (0~100)</td>
</tr>
<tr>
<td><strong>QED</strong></td>
<td>약물 유사성 정량 지표 (0~1)</td>
</tr>
</tbody>
</table>
<h3 id="%EA%B0%95%ED%99%94-%EB%B3%80%EC%9D%B4%EC%B2%B4-5%EC%A2%85">강화 변이체 5종</h3>
<p><code>A1S</code>(친수성↑) <code>K4R</code>(전하유지) <code>F6Y</code>(H-bond↑)<br />
<code>K9R</code>(전하유지) <code>F11Y</code>(H-bond↑)</p>

<h1 id="%EC%A0%95%EB%A6%AC">정리</h1>
<div class="columns">
<div class="col">
<h3 id="%EC%9D%B4-%EC%8B%9C%EC%8A%A4%ED%85%9C%EC%9D%98-%EA%B0%80%EC%B9%98">이 시스템의 가치</h3>
<p>기존의 <strong>도구 간 단절된 워크플로우</strong>를<br />
5-Agent가 <strong>자동 반복하는 폐루프</strong>로 전환</p>
<ul>
<li>반복당 ~240 후보 스크리닝</li>
<li>전 과정 <strong>추적 가능한 구조화 로그</strong></li>
<li>wet-lab 전 <strong>in silico 우선순위 결정</strong></li>
<li>13가지 약리학 메트릭 자동 계산</li>
</ul>
</div>
<div class="col">
<h3 id="%ED%96%A5%ED%9B%84-%EA%B3%84%ED%9A%8D">향후 계획</h3>
<ul>
<li>Silo A (de novo) 파이프라인 구현</li>
<li>Silo A+B <strong>통합 오케스트레이션</strong></li>
<li>wet-lab 결과 → Planner 피드백 루프</li>
<li>QC 게이트: proline 백본 제약 반영</li>
<li>ADMET 전임상 약리학 자동화</li>
</ul>
</div>

<h1 id="appendix-a-2-boman--instability--ai">Appendix A-2: Boman &amp; Instability &amp; AI</h1>
<h3 id="boman-index-6--%EB%8B%A8%EB%B0%B1%EC%A7%88-%EA%B2%B0%ED%95%A9-%EC%9E%A0%EC%9E%AC%EB%A0%A5">Boman Index [6] — 단백질 결합 잠재력</h3>
<p><code>BI = −(1/N) × Σ ΔG_transfer(i)</code> (Radzicka-Wolfenden, kcal/mol)<br />
<small><strong>[6] p.204, &quot;A simple index&quot;</strong> — <em>&quot;hormones and neuropeptides have high indices&quot;</em></small><br />
BI <strong>&gt; 2.48</strong> → 호르몬/수용체 리간드형</p>
<h3 id="instability-index-7--guruprasad-et-al">Instability Index [7] — Guruprasad et al.</h3>
<p><code>II = (10/L) × Σ DIWV(x_i, x_{i+1})</code>, DIWV = 20×20 가중치<br />
<small><strong>[7] Eq.1, p.156; Table I, p.157</strong> — <em>&quot;a protein whose index is less than 40 is predicted as stable&quot;</em></small><br />
<strong>II &lt; 40</strong> → 안정 (in vivo) / ≥ 40 → 불안정</p>
<h3 id="aliphatic-index-8--%EC%97%B4%EC%95%88%EC%A0%95%EC%84%B1">Aliphatic Index [8] — 열안정성</h3>
<p><code>AI = X(A) + 2.9·X(V) + 3.9·[X(I)+X(L)]</code> <small><strong>[8] Eq.1, p.1896</strong> — <em>&quot;positively correlated with thermostability&quot;</em></small></p>
</section>

<h1 id="appendix-a-3-%CE%B5%E2%82%82%E2%82%88%E2%82%80--pi">Appendix A-3: ε₂₈₀ &amp; pI</h1>
<h3 id="extinction-coefficient-12--%CE%B5%E2%82%82%E2%82%88%E2%82%80">Extinction Coefficient [12] — ε₂₈₀</h3>
<p><code>ε₂₈₀ = n_Trp × 5500 + n_Tyr × 1490 + n_SS × 125</code> (M⁻¹cm⁻¹)<br />
<small><strong>[12] Eq.1, p.2413</strong> — <em>&quot;ε(280) = nTrp × 5500 + nTyr × 1490 + nCystine × 125&quot;</em></small></p>
<h3 id="isoelectric-point-pi-9--bjellqvist-et-al">Isoelectric Point (pI) [9] — Bjellqvist et al.</h3>
<p>Bisection 알고리즘 (pH 0-14), Henderson-Hasselbalch 기반<br />
<small><strong>[9] Table 1, p.1025</strong> — <em>&quot;The pK values for amino acid residues in polypeptides&quot;</em></small><br />
Net charge = 0이 되는 pH → pI</p>
<h3 id="hydrophobic-moment-10--eisenberg">Hydrophobic Moment [10] — Eisenberg</h3>
<p><code>μH = (1/N) √[ (Σ H_i·sin(iδ))² + (Σ H_i·cos(iδ))² ]</code><br />
<small><strong>[10] Eq.1, Fig.1, p.372</strong> — <em>&quot;a measure of the amphiphilicity of a helix&quot;</em></small><br />
δ = 100° (α-helix), window = 11, μH <strong>&gt; 0.35</strong> → 강한 양친매성 (막 결합/AMP)</p>

<p>His (imidazole N, 강: Zn²⁺/Cu²⁺/<strong>Ga³⁺</strong>) · Cys (thiolate S, 강: Cu⁺/Zn²⁺) · Asp/Glu (carboxylate O, 중: Ca²⁺)</p>

<h1 id="appendix-c-1-unified-scoring--silo-a--b-%EA%B3%B5%EC%8B%9D">Appendix C-1: Unified Scoring — Silo A &amp; B 공식</h1>
<div class="columns">
<div class="col">
<h3 id="silo-b-pyrosetta-only">Silo B (PyRosetta Only)</h3>
<p><code>S_B = 0.70·ddG + 0.20·total + 0.10·clash</code></p>
<table>
<thead>
<tr>
<th>지표</th>
<th style="text-align:center">가중치</th>
<th style="text-align:center">방향</th>
<th>정규화</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>ddG</strong></td>
<td style="text-align:center">0.70</td>
<td style="text-align:center">낮을수록 ↑</td>
<td>1 − MinMax</td>
</tr>
<tr>
<td><strong>total_score</strong></td>
<td style="text-align:center">0.20</td>
<td style="text-align:center">낮을수록 ↑</td>
<td>1 − MinMax</td>
</tr>
<tr>
<td><strong>clash</strong></td>
<td style="text-align:center">0.10</td>
<td style="text-align:center">낮을수록 ↑</td>
<td>1 − MinMax</td>
</tr>
</tbody>
</table>
<p><strong>Hard violation</strong>: −8.0/건 (ddG&gt;0, clash&gt;20)<br />
<strong>Soft violation</strong>: −0.4/규칙 (ddG&gt;−3, clash&gt;10)</p>
<blockquote>
<p><strong>ddG 지배적</strong> (70%) — Rosetta FlexPepDock 결합 에너지가 순위 결정의 핵심</p>
</blockquote>
</div>
<div class="col">
<h3 id="silo-a-nim-%ED%86%B5%ED%95%A9">Silo A (NIM 통합)</h3>
<p><code>S_A = 0.15·pLDDT + 0.25·dock + 0.25·ddG + 0.15·lDDT + 0.20·sel</code></p>
<table>
<thead>
<tr>
<th>지표</th>
<th style="text-align:center">가중치</th>
<th style="text-align:center">방향</th>
<th>의미</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>pLDDT</strong></td>
<td style="text-align:center">0.15</td>
<td style="text-align:center">높을수록 ↑</td>
<td>구조 신뢰도</td>
</tr>
<tr>
<td><strong>dock_score</strong></td>
<td style="text-align:center">0.25</td>
<td style="text-align:center">낮을수록 ↑</td>
<td>도킹 품질</td>
</tr>
<tr>
<td><strong>ddG</strong></td>
<td style="text-align:center">0.25</td>
<td style="text-align:center">낮을수록 ↑</td>
<td>결합 에너지</td>
</tr>
<tr>
<td><strong>lDDT</strong></td>
<td style="text-align:center">0.15</td>
<td style="text-align:center">높을수록 ↑</td>
<td>구조 보존</td>
</tr>
<tr>
<td><strong>selectivity</strong></td>
<td style="text-align:center">0.20</td>
<td style="text-align:center">낮을수록 ↑</td>
<td>SSTR2 특이성</td>
</tr>
</tbody>
</table>
<p>모든 지표 <strong>MinMax [0,1]</strong> 정규화 후 가중합<br />
<small>&quot;낮을수록 좋은&quot; 지표는 <code>1 − norm(x)</code> 반전 적용</small></p>
</div>

<h1 id="appendix-c-2-qc-gate--4%EB%8B%A8%EA%B3%84-%EC%88%9C%EC%B0%A8-%ED%95%84%ED%84%B0">Appendix C-2: QC Gate — 4단계 순차 필터</h1>
<div class="columns">
<div class="col">
<h3 id="gate-%ED%9D%90%EB%A6%84-and-%EC%A1%B0%EA%B1%B4-%EC%88%9C%EC%B0%A8-%EC%A0%81%EC%9A%A9">Gate 흐름 (AND 조건, 순차 적용)</h3>
<table>
<thead>
<tr>
<th style="text-align:center">Gate</th>
<th>대상</th>
<th>조건</th>
<th>기본 임계값</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center"><strong>1</strong></td>
<td>ESMFold pLDDT</td>
<td>mean ≥ T₁ <strong>AND</strong> interface ≥ T₂</td>
<td>T₁=50, T₂=45</td>
</tr>
<tr>
<td style="text-align:center"><strong>2</strong></td>
<td>Docking Score</td>
<td>상위 P% 이내</td>
<td>P=20%</td>
</tr>
<tr>
<td style="text-align:center"><strong>3</strong></td>
<td>Rosetta</td>
<td>ddG ≤ T₃ <strong>AND</strong> clash ≤ T₄ <strong>AND</strong> violations=0</td>
<td>T₃=−5.0, T₄=10</td>
</tr>
<tr>
<td style="text-align:center"><strong>4</strong></td>
<td>Selectivity</td>
<td>margin ≤ T₅ <strong>AND</strong> offtarget ≤ T₆</td>
<td>T₅=−10, T₆=−15</td>
</tr>
</tbody>
</table>
<h3 id="%ED%8C%90%EC%A0%95-%EA%B2%B0%EA%B3%BC">판정 결과</h3>
<ul>
<li><strong>PASS</strong>: Gate 1~3 전부 통과 (Gate 4는 선택적)</li>
<li><strong>FAIL</strong>: 실패 사유 기록 (<code>plddt_mean</code>, <code>clash</code>, <code>ddg</code> 등)</li>
<li><strong>pass_rate</strong>: 반복별 통과율 추적 → QC Funnel 시각화</li>
</ul>
</div>
<div class="col">
<h3 id="gate-%ED%99%9C%EC%84%B1%ED%99%94-%EC%84%A4%EC%A0%95">Gate 활성화 설정</h3>

</code></pre>
<h3 id="silo-b-%EC%A0%84%EC%9A%A9-pyrosetta-%EB%AA%A8%EB%93%9C">Silo B 전용 (PyRosetta 모드)</h3>
<p>Gate 1·2 <strong>비활성화</strong> (ESMFold/DiffDock 미사용)<br />
Gate 3만 활성: <code>ddG ≤ −5.0</code> AND <code>clash ≤ 10</code></p>
<p><small>추가 Gate: 이황화 SG-SG ≤ 2.5Å · 안정성 반감기 ≥ 50h</small></p>

<h1 id="appendix-c-3-thompson-sampling--%EC%9C%84%EC%B9%98-%EC%B5%9C%EC%A0%81%ED%99%94-%EB%B0%B4%EB%94%A7">Appendix C-3: Thompson Sampling — 위치 최적화 밴딧</h1>
<div class="columns">
<div class="col">
<h3 id="beta-%EB%B6%84%ED%8F%AC-%EB%8B%A4%EC%A4%91-%ED%8C%94-%EB%B0%B4%EB%94%A7">Beta 분포 다중 팔 밴딧</h3>
<p>각 가변 위치에 Beta(α, β) 사후분포를 유지하여 <strong>탐색-활용 균형</strong>을 자동 조절합니다.</p>
<p><strong>기준 서열</strong>: <code>AGCKNFFWKTFTSC</code> (SST-14)<br />
<strong>가변 위치</strong> (1-indexed): <strong>1, 2, 4, 5, 6, 11, 12, 13</strong> (8개)<br />
<small>불변 위치: C3, F7, W8, K9, T10, C14 (파마코포어+이황화)</small></p>
<h3 id="%EC%82%AC%EC%A0%84%EB%B6%84%ED%8F%AC--%EA%B0%B1%EC%8B%A0-%EA%B7%9C%EC%B9%99">사전분포 &amp; 갱신 규칙</h3>
<p><strong>Prior</strong>: α=1, β=1 (Uniform)</p>
<table>
<thead>
<tr>
<th>조건</th>
<th>갱신</th>
</tr>
</thead>
<tbody>
<tr>
<td>ddG &lt; baseline (WT 평균)</td>
<td><strong>α += 1</strong> (성공)</td>
</tr>
<tr>
<td>ddG ≥ baseline</td>
<td><strong>β += 1</strong> (실패)</td>
</tr>
</tbody>
</table>
<p>baseline = WT 관찰 평균 ddG, 없으면 전체 중앙값</p>
</div>
<div class="col">
<h3 id="%EC%83%98%ED%94%8C%EB%A7%81--%EC%9C%84%EC%B9%98-%EC%84%A0%EC%A0%95">샘플링 &amp; 위치 선정</h3>
<p>매 반복마다:</p>
<ol>
<li>각 위치 i에서 <code>θᵢ ~ Beta(αᵢ, βᵢ)</code> 샘플링</li>
<li>θ 값 내림차순 정렬</li>
<li><strong>상위 N개 위치</strong> 반환 → Planner에게 전달</li>
</ol>
<h3 id="%EA%B8%B0%EB%8C%80%EA%B0%92--%EC%88%98%EB%A0%B4">기대값 &amp; 수렴</h3>
<p><code>E[θᵢ] = αᵢ / (αᵢ + βᵢ)</code></p>
<ul>
<li>E[θ] → 1: 해당 위치 <strong>반복 개선</strong> / → 0: <strong>불리</strong> → 자동 회피</li>
<li>분산 감소: 관찰↑ → 불확실성↓</li>
</ul>
<p><small>유효 범위: ddG ∈ [−60.0, 200.0], 범위 밖 이상치는 갱신 제외</small></p>
</div>
</div>
</section>

<h1 id="appendix-c-4-mann-whitney-u-%EC%88%98%EB%A0%B4-%EA%B2%80%EC%A0%95">Appendix C-4: Mann-Whitney U 수렴 검정</h1>
<div class="columns">
<div class="col">
<h3 id="%EC%88%98%EB%A0%B4-%ED%8C%90%EC%A0%95-%EC%A1%B0%EA%B1%B4-%EB%91%90-%EA%B0%80%EC%A7%80-%EB%8F%99%EC%8B%9C-%EC%B6%A9%EC%A1%B1">수렴 판정 조건 (두 가지 동시 충족)</h3>
<p><strong>조건 1</strong>: Mann-Whitney U 검정 p &gt; 0.05<br />
→ 이전 윈도우와 현재 윈도우 사이 <strong>유의차 없음</strong></p>
<p><strong>조건 2</strong>: 변동계수 CV &lt; 0.15<br />
→ 현재 윈도우의 top-k ddG 값이 <strong>안정적</strong></p>
<p><code>CV = σ / |μ|</code> (현재 윈도우 top-k ddG)</p>
<h3 id="%ED%8C%8C%EB%9D%BC%EB%AF%B8%ED%84%B0">파라미터</h3>
<table>
<thead>
<tr>
<th>항목</th>
<th style="text-align:center">기본값</th>
<th>의미</th>
</tr>
</thead>
<tbody>
<tr>
<td>window_size</td>
<td style="text-align:center"><strong>3</strong></td>
<td>비교 윈도우 크기 (반복 수)</td>
</tr>
<tr>
<td>α (유의수준)</td>
<td style="text-align:center"><strong>0.05</strong></td>
<td>U 검정 임계</td>
</tr>
<tr>
<td>CV 임계</td>
<td style="text-align:center"><strong>0.15</strong></td>
<td>변동계수 상한</td>
</tr>
<tr>
<td>최소 반복</td>
<td style="text-align:center"><strong>6</strong></td>
<td>2×window 이후 검정 시작</td>
</tr>
</tbody>
</table>
</div>
<div class="col">
<h3 id="mann-whitney-u-%ED%86%B5%EA%B3%84%EB%9F%89">Mann-Whitney U 통계량</h3>
<p><strong>U = min(U₁, U₂)</strong></p>
<p><code>U₁ = n₁n₂ + n₁(n₁+1)/2 − R₁</code></p>
<p>R₁ = 이전 윈도우 순위합</p>
<h3 id="%EC%A0%95%EA%B7%9C-%EA%B7%BC%EC%82%AC-n-%E2%89%A5-8">정규 근사 (n ≥ 8)</h3>
<p><code>z = (U − μ_U) / σ_U</code></p>
<p>μ_U = n₁n₂/2<br />
σ_U = √[n₁n₂(n₁+n₂+1)/12]</p>
<p>연속성 보정: <code>z = (|U − μ_U| − 0.5) / σ_U</code></p>
<p><small><strong>흐름</strong>: 6+반복 수집 → 이전3 vs 현재3 분할 → p&gt;0.05 + CV&lt;0.15 → <strong>Converged</strong></small></p>
</div>
</div>

<h1 id="appendix-e-1-ai-%EB%AA%A8%EB%8D%B8--molmim--diffdock">Appendix E-1: AI 모델 — MolMIM &amp; DiffDock</h1>
<div class="columns">
<div class="col">
<h3 id="molmim-nvidia">MolMIM (NVIDIA)</h3>
<p><strong>유형</strong>: 소분자 생성 모델 (Generative)<br />
<strong>방법</strong>: Mutual Information Machine — 잠재 공간(latent space)에서 분자를 생성하고 QED/logP 등 약물성 지표를 최적화<br />
<strong>입력</strong>: 표적 단백질 포켓 구조 또는 시드 분자<br />
<strong>출력</strong>: SMILES 형식의 소분자 후보 + QED 점수</p>
<table>
<thead>
<tr>
<th>항목</th>
<th>내용</th>
</tr>
</thead>
<tbody>
<tr>
<td>학습 데이터</td>
<td>ZINC, ChEMBL 소분자 DB</td>
</tr>
<tr>
<td>핵심 지표</td>
<td><strong>QED</strong> (0~1), 약물 유사성 정량화</td>
</tr>
<tr>
<td>본 시스템 활용</td>
<td>Arm 1: 40개 소분자 생성 (QED=0.94)</td>
</tr>
</tbody>
</table>
<p><small>NVIDIA NIM API Documentation, 2024</small></p>
</div>
<div class="col">
<h3 id="diffdock-19">DiffDock [19]</h3>
<p><strong>유형</strong>: 분자 도킹 모델 (Diffusion-based)<br />
<strong>방법</strong>: 확산 모델로 리간드의 회전·이동·비틀림을 동시 샘플링하여 결합 포즈 예측<br />
<strong>특징</strong>: <strong>블라인드 도킹</strong> — 결합 부위 사전 지정 불필요</p>
<table>
<thead>
<tr>
<th>항목</th>
<th>내용</th>
</tr>
</thead>
<tbody>
<tr>
<td>기반</td>
<td>Score-based diffusion (SE(3))</td>
</tr>
<tr>
<td>입력</td>
<td>리간드 + 수용체 전체 구조</td>
</tr>
<tr>
<td>출력</td>
<td>랭킹된 결합 포즈 + confidence score</td>
</tr>
<tr>
<td>장점</td>
<td>전체 표면 탐색, 기존 도킹 대비 높은 성공률</td>
</tr>
<tr>
<td>본 시스템</td>
<td>Arm 1/2/3 공통 도킹 단계 (Step 05)</td>
</tr>
</tbody>
</table>
<p><small>Corso G et al. <em>ICLR</em> (2023)</small></p>
</div>
</div>

<h1 id="appendix-e-2-ai-%EB%AA%A8%EB%8D%B8--rfdiffusion-proteinmpnn-esmfold">Appendix E-2: AI 모델 — RFdiffusion, ProteinMPNN, ESMFold</h1>
<div class="columns">
<div class="col">
<h3 id="rfdiffusion-16">RFdiffusion [16]</h3>
<p><strong>유형</strong>: 단백질 구조 생성 (Diffusion)<br />
<strong>방법</strong>: Denoising diffusion → <strong>de novo 펩타이드 백본</strong> 설계<br />
<strong>입출력</strong>: 포켓 구조 + contigs → 3D 백본 좌표 (Cα trace)<br />
<small>RoseTTAFold 기반 · <em>Nature</em> 620:1089 (2023)</small></p>
<h3 id="proteinmpnn-17">ProteinMPNN [17]</h3>
<p><strong>유형</strong>: 서열 설계 (Inverse Folding)<br />
<strong>방법</strong>: 3D 백본 → <strong>최적 아미노산 서열</strong> 할당<br />
<strong>입출력</strong>: 백본 구조 → 서열 + per-residue 확률<br />
<small><em>Science</em> 378:49 (2022)</small></p>
</div>
<div class="col">
<h3 id="esmfold-18">ESMFold [18]</h3>
<p><strong>유형</strong>: 구조 예측 (Language Model)<br />
<strong>방법</strong>: ESM-2 (15B) 서열→3D 구조, MSA <strong>불필요</strong></p>
<table>
<thead>
<tr>
<th>항목</th>
<th>내용</th>
</tr>
</thead>
<tbody>
<tr>
<td>입력</td>
<td>아미노산 서열</td>
</tr>
<tr>
<td>출력</td>
<td>3D 구조 + <strong>pLDDT</strong> 신뢰도</td>
</tr>
<tr>
<td>속도</td>
<td>AlphaFold2 대비 ~60배 빠름</td>
</tr>
<tr>
<td>본 시스템</td>
<td>Arm 3 Step 04 (pLDDT=81.4)</td>
</tr>
</tbody>
</table>
<p><small><em>Science</em> 379:1123 (2023)</small></p>
<p><strong>Arm 3 흐름</strong>: RFdiffusion(백본) → ProteinMPNN(서열) → ESMFold(검증) → DiffDock(도킹)</p>
</div>
</div>

<h1 id="appendix-f-2-molmim--%EC%86%8C%EB%B6%84%EC%9E%90-%EC%83%9D%EC%84%B1-%EB%AA%A8%EB%8D%B8">Appendix F-2: MolMIM — 소분자 생성 모델</h1>
<div class="columns">
<div class="col">
<h3 id="%EB%AA%A8%EB%8D%B8-%EA%B0%9C%EC%9A%94">모델 개요</h3>
<p>NVIDIA의 <strong>Mutual Information Machine</strong> 기반 생성 모델.<br />
시드 분자의 <strong>잠재 공간</strong>(latent space)을 탐색하여 약물성이 높은 신규 분자를 자동 생성한다.</p>
<p><strong>작동 원리</strong></p>
<ol>
<li>SMILES 문자열을 Perceiver 인코더로 고정 크기 잠재 벡터에 매핑</li>
<li>CMA-ES 최적화로 QED·logP 등 원하는 속성 방향으로 탐색</li>
<li>디코더가 새로운 SMILES 문자열 출력</li>
</ol>
<p><strong>학습 데이터</strong>: ZINC15 <strong>17억 분자</strong><br />
(MW≤500, LogP≤5, QED≥0.5 약물 유사 화합물)</p>
</div>
<div class="col">
<h3 id="%EC%84%B1%EB%8A%A5-%EB%B2%A4%EC%B9%98%EB%A7%88%ED%81%AC">성능 벤치마크</h3>
<table>
<thead>
<tr>
<th>지표</th>
<th>수치</th>
<th>의미</th>
</tr>
</thead>
<tbody>
<tr>
<td>유효성</td>
<td><strong>~100%</strong></td>
<td>생성 분자 전부 화학적으로 유효</td>
</tr>
<tr>
<td>QED 최적화</td>
<td>SOTA <strong>+5%p</strong></td>
<td>약물 유사성 점수 업계 최고</td>
</tr>
<tr>
<td>유효 신규성</td>
<td>경쟁 모델 <strong>+12%p</strong></td>
<td>새롭고 유효한 분자 비율</td>
</tr>
<tr>
<td>다양성</td>
<td>상위권</td>
<td>중복 없이 다양한 구조 생성</td>
</tr>
</tbody>
</table>
<h3 id="%EA%B8%B0%EC%A1%B4-%EB%B0%A9%EB%B2%95-%EB%8C%80%EB%B9%84-%EC%B0%A8%EB%B3%84%EC%A0%90">기존 방법 대비 차별점</h3>
<table>
<thead>
<tr>
<th>기존 (VAE 기반)</th>
<th>MolMIM</th>
</tr>
</thead>
<tbody>
<tr>
<td>유효성↑ 이면 신규성↓</td>
<td><strong>둘 다 동시 달성</strong></td>
</tr>
<tr>
<td>잠재 공간 불안정</td>
<td>MI 학습으로 <strong>안정적 잠재 공간</strong></td>
</tr>
<tr>
<td>속성 최적화 어려움</td>
<td>CMA-ES로 <strong>직접 최적화</strong></td>
</tr>
</tbody>
</table>
</div>
</div>
<p><strong>핵심</strong>: &quot;화학적으로 유효 + 기존에 없던 + 약물처럼 보이는&quot; 세 조건을 동시 충족 · 본 시스템 Silo A Arm 1에서 <strong>40종 소분자 후보</strong> 생성 (평균 QED=<strong>0.94</strong>)</p>
</section>

<h1 id="appendix-f-3-diffdock--%EB%B8%94%EB%9D%BC%EC%9D%B8%EB%93%9C-%EB%B6%84%EC%9E%90-%EB%8F%84%ED%82%B9">Appendix F-3: DiffDock — 블라인드 분자 도킹</h1>
<div class="columns">
<div class="col">
<h3 id="%EB%AA%A8%EB%8D%B8-%EA%B0%9C%EC%9A%94-1">모델 개요</h3>
<p>확산 모델(Score-based diffusion on SE(3))로 리간드의 <strong>회전·이동·비틀림</strong>을 동시 샘플링. 결합 부위를 <strong>사전 지정하지 않고도</strong>(블라인드) 정확한 결합 포즈를 예측한다.</p>
<p><strong>작동 원리</strong></p>
<ol>
<li>단백질 전체 표면에 리간드를 무작위 배치</li>
<li>확산 과정을 역으로 진행하며 최적 포즈로 수렴</li>
<li>confidence score로 예측 신뢰도 출력</li>
</ol>
<h3 id="%EC%84%B1%EB%8A%A5-%EB%B2%A4%EC%B9%98%EB%A7%88%ED%81%AC-pdbbind">성능 벤치마크 (PDBBind)</h3>

<td><strong>38%</strong> (블라인드)</td>

<td>confidence score 제공</td>
</tr>

<h3 id="%EC%A7%80%ED%91%9C%EA%B0%80-%EC%9D%98%EB%AF%B8%ED%95%98%EB%8A%94-%EA%B2%83">지표가 의미하는 것</h3>
<ul>
<li><strong>Top-1 38.2%</strong>: 1순위 예측이 실제 포즈와 2Å 이내. 기존 ~20%에서 <strong>2배 향상</strong></li>
<li><strong>고신뢰 83%</strong>: 상위 1/3 선별 시 83% → <strong>자동 필터링으로 고품질 결과</strong></li>
<li><strong>속도</strong>: GPU로 수백만 분자 시간 내 스크리닝 (3-12×)</li>

<h1 id="appendix-f-4-rfdiffusion--de-novo-%EB%8B%A8%EB%B0%B1%EC%A7%88-%EB%B0%B1%EB%B3%B8-%EC%84%A4%EA%B3%84">Appendix F-4: RFdiffusion — de novo 단백질 백본 설계</h1>
<div class="columns">
<div class="col">
<h3 id="%EB%AA%A8%EB%8D%B8-%EA%B0%9C%EC%9A%94-2">모델 개요</h3>
<p>노이즈 제거 확산(denoising diffusion)으로 표적에 결합하는 <strong>단백질 백본을 처음부터 새로</strong> 설계. RoseTTAFold 아키텍처 기반.</p>
<p><strong>작동 원리</strong></p>
<ol>
<li>무작위 노이즈에서 시작 (3D 좌표)</li>
<li>단계적으로 노이즈를 제거하며 구조 정제</li>
<li>표적 포켓 정보를 조건으로 주어 결합체 생성</li>
<li>contigs로 길이·위치 제약 제어</li>
</ol>
<h3 id="%EC%84%B1%EB%8A%A5-%EB%B2%A4%EC%B9%98%EB%A7%88%ED%81%AC-1">성능 벤치마크</h3>
<table>
<thead>
<tr>
<th>지표</th>
<th>수치</th>
<th>해석</th>
</tr>
</thead>
<tbody>
<tr>
<td>실험 성공률</td>
<td><strong>19%</strong></td>
<td>설계 5개 중 1개 실제 결합</td>
</tr>
<tr>
<td>vs Rosetta</td>
<td><strong>~100배</strong></td>
<td>기존 0.1-0.2% → 19%</td>
</tr>
<tr>
<td>적용 범위</td>
<td>50-400 AA</td>
<td>대부분 단일 도메인 커버</td>
</tr>
</tbody>
</table>
</div>
<div class="col">
<h3 id="%EC%A7%80%ED%91%9C%EA%B0%80-%EC%9D%98%EB%AF%B8%ED%95%98%EB%8A%94-%EA%B2%83-1">지표가 의미하는 것</h3>
<p><strong>&quot;5개 설계하면 1개가 실험에서 작동한다&quot;</strong></p>
<p>이전 Rosetta 기반 방법은 <strong>수천 개를 설계해야 1개가 성공</strong>했다. RFdiffusion은 이를 100배 개선하여, 소수의 설계만으로도 실험적 검증이 가능해졌다.</p>
<p><strong>실험 비용 관점</strong>: 단백질 1개의 실험 검증에 수십만 원이 드므로, 성공률 100배 향상은 <strong>연구비 100분의 1 절감</strong>과 동일.</p>
<h3 id="%EC%A0%81%EC%9A%A9-%EB%B2%94%EC%9C%84">적용 범위</h3>
<ul>
<li>단량체 (monomer) 설계</li>
<li>결합체 (binder) 설계 — <strong>본 시스템 핵심</strong></li>
<li>대칭 올리고머 · 효소 스캐폴딩 · 금속 결합 단백질</li>
<li><strong>본 시스템</strong>: Arm 3 Step 02 — SSTR2 포켓 결합 백본 생성</li>
</ul>
</div>
</div>

<h1 id="appendix-f-5-proteinmpnn--%EC%84%9C%EC%97%B4-%EC%84%A4%EA%B3%84-%EC%97%AD%EC%A0%91%ED%9E%98">Appendix F-5: ProteinMPNN — 서열 설계 (역접힘)</h1>
<div class="columns">
<div class="col">
<h3 id="%EB%AA%A8%EB%8D%B8-%EA%B0%9C%EC%9A%94-3">모델 개요</h3>
<p>3D 백본 구조가 주어지면, 그 구조로 접힐 수 있는 <strong>최적 아미노산 서열</strong>을 할당하는 역접힘(inverse folding) 모델.</p>
<p><strong>작동 원리</strong></p>
<ol>
<li>백본의 3D 좌표를 그래프로 인코딩</li>
<li>Message-passing 신경망이 각 위치의 아미노산 확률 예측</li>
<li>자기회귀적으로 서열 생성 (per-residue 확률 출력)</li>
</ol>
<h3 id="%EC%84%B1%EB%8A%A5-%EB%B2%A4%EC%B9%98%EB%A7%88%ED%81%AC-2">성능 벤치마크</h3>
<table>
<thead>
<tr>
<th>지표</th>
<th>MPNN</th>
<th>Rosetta</th>
<th>향상</th>
</tr>
</thead>
<tbody>
<tr>
<td>서열 복구율</td>
<td><strong>52.4%</strong></td>
<td>32.9%</td>
<td>+19.5pp</td>
</tr>
<tr>
<td>용해도</td>
<td><strong>88%</strong></td>
<td>40%</td>
<td><strong>2.2배</strong></td>
</tr>
<tr>
<td>단백질 수율</td>
<td><strong>247 mg/L</strong></td>
<td>9 mg/L</td>
<td><strong>27배</strong></td>
</tr>
</tbody>
</table>
</div>
<div class="col">
<h3 id="%EC%A7%80%ED%91%9C%EA%B0%80-%EC%9D%98%EB%AF%B8%ED%95%98%EB%8A%94-%EA%B2%83-2">지표가 의미하는 것</h3>
<ul>
<li>
<p><strong>서열 복구율 52.4%</strong>: 자연 서열의 <strong>절반 이상을 정확히 복원</strong>. 나머지 48%도 대부분 보존적 치환(예: Leu→Ile)이라 구조와 기능이 유지됨</p>
</li>
<li>
<p><strong>용해도 88%</strong>: 설계 단백질 <strong>10개 중 9개</strong>가 대장균에서 발현·용해. Rosetta는 10개 중 4개만 성공 → 실험 실패율 대폭 감소</p>
</li>
<li>
<p><strong>수율 27배</strong>: 같은 발현 조건에서 <strong>27배 많은 단백질</strong> 확보. 후속 실험(결합 측정, 구조 분석)에 충분한 양을 쉽게 확보</p>
</li>
<li>
<p><strong>속도 1000×</strong>: 백본 1개당 <strong>~1초</strong>. Rosetta 수분~수시간 대비</p>
</li>
</ul>
<p><small>본 시스템: Arm 3 Step 03 — RFdiffusion 백본에 서열 할당</small></p>

<h1 id="appendix-f-6-esmfold--%EA%B5%AC%EC%A1%B0-%EC%98%88%EC%B8%A1">Appendix F-6: ESMFold — 구조 예측</h1>
<div class="columns">
<div class="col">
<h3 id="%EB%AA%A8%EB%8D%B8-%EA%B0%9C%EC%9A%94-4">모델 개요</h3>
<p><strong>15B 파라미터</strong> 단백질 언어 모델(ESM-2). 다중 서열 정렬(MSA) 없이 <strong>서열만으로</strong> 3D 구조를 예측한다.</p>
<p><strong>작동 원리</strong></p>
<ol>
<li>아미노산 서열을 ESM-2 언어 모델에 입력</li>
<li>트랜스포머가 잔기 간 관계를 학습</li>
<li>Structure module이 3D 좌표 + pLDDT 신뢰도 출력</li>
</ol>
<h3 id="%EC%84%B1%EB%8A%A5-%EB%B2%A4%EC%B9%98%EB%A7%88%ED%81%AC-3">성능 벤치마크</h3>
<table>
<thead>
<tr>
<th>지표</th>
<th>ESMFold</th>
<th>AlphaFold2</th>
<th>해석</th>
</tr>
</thead>
<tbody>
<tr>
<td>TM (no MSA)</td>
<td><strong>0.68</strong></td>
<td>0.37</td>
<td><strong>1.8배</strong></td>
</tr>
<tr>
<td>고신뢰 RMSD</td>
<td><strong>1.33Å</strong></td>
<td>유사</td>
<td>실험급 정확도</td>
</tr>
<tr>
<td>속도 (&lt;200 AA)</td>
<td><strong>&gt;60배</strong></td>
<td>기준</td>
<td>초 단위 예측</td>
</tr>
<tr>
<td>pLDDT 중앙값</td>
<td>87.4</td>
<td>92.7</td>
<td>약간 낮지만 실용적</td>
</tr>
</tbody>
</table>
</div>
<div class="col">
<h3 id="%EC%A7%80%ED%91%9C%EA%B0%80-%EC%9D%98%EB%AF%B8%ED%95%98%EB%8A%94-%EA%B2%83-3">지표가 의미하는 것</h3>
<ul>
<li>
<p><strong>TM-score 0.68 vs 0.37</strong>: MSA 없이 단일 서열만 줄 때, AlphaFold2는 0.37로 급락하지만 ESMFold은 <strong>0.68 유지</strong> → 상동 서열이 없는 <strong>설계 단백질에 최적</strong></p>
</li>
<li>
<p><strong>&gt;60배 속도</strong>: AlphaFold2는 MSA 검색에 ~30분 필요. ESMFold은 MSA 불필요 → <strong>초 단위 예측</strong>. 대량 후보 검증에 필수적</p>
</li>
<li>
<p><strong>pLDDT 87.4</strong>: 신뢰도(0-100). <strong>70+면 실용적</strong>, 90+면 매우 높음. 6억+ 메타게놈 구조 예측 실적</p>
</li>
</ul>
<p><strong>본 시스템</strong>: Silo A Arm 3 Step 04 — ProteinMPNN 서열 → ESMFold 구조 예측 (pLDDT=<strong>81.4</strong>)</p>
</div>
</div>

<h1 id="appendix-g-2-unified-validation--%EB%B2%94%EC%A3%BC%EB%B3%84-%ED%95%B4%EC%84%A4">Appendix G-2: Unified Validation — 범주별 해설</h1>
<div class="columns">
<div class="col">
<h3 id="%EC%95%BD%EB%A6%AC%ED%95%99-12%EA%B8%B0%EC%A4%80--%EC%97%AD%ED%95%A0">약리학 12기준 — 역할</h3>
<p>약리학 기준은 13-메트릭에서 <strong>금속 배위</strong>를 방사성의약품 범주로 분리한 12개입니다.</p>
<ul>
<li><strong>물리화학</strong> (1~6): 용해도·안정성·정량 가능성 등 기본 druglikeness</li>
<li><strong>구조·동역학</strong> (7~9): 반감기·막 상호작용·양친매성</li>
<li><strong>기능</strong> (10~12): 종양 선택성(pH)·대사 안정성(프로테아제)·진화 보존(BLOSUM)</li>
</ul>
<h3 id="%EB%B0%A9%EC%82%AC%EC%84%B1%EC%9D%98%EC%95%BD%ED%92%88-2%EA%B8%B0%EC%A4%80--%EC%97%AD%ED%95%A0">방사성의약품 2기준 — 역할</h3>
<table>
<thead>
<tr>
<th>기준</th>
<th>설명</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>금속 배위</strong></td>
<td>His/Cys 잔기가 ⁶⁸Ga³⁺ 킬레이트 형성에 충분한지</td>
</tr>
<tr>
<td><strong>신장독성</strong></td>
<td>ADMET 기반 신장 부담 위험 점수 — 방사성의약품은 신장 배출이 주경로</td>
</tr>
</tbody>
</table>
</div>
<div class="col">
<h3 id="%ED%86%B5%EA%B3%84%EC%A0%81-3%EA%B8%B0%EC%A4%80--%EC%97%AD%ED%95%A0">통계적 3기준 — 역할</h3>
<p>다중 실행(multi-run) <strong>재현성·공정성</strong> 보장</p>
<table>
<thead>
<tr>
<th>기준</th>
<th>의미</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Rank Stability</strong></td>
<td>순위가 실행마다 안정적인지</td>
</tr>
<tr>
<td><strong>Score Consistency</strong></td>
<td>ddG 점수 실행 간 일관 (CV&lt;15%)</td>
</tr>
<tr>
<td><strong>No Dominance</strong></td>
<td>단일 후보 지배 여부 (편향 탐지)</td>
</tr>
</tbody>
</table>
<h3 id="pass--caution--fail-%ED%8C%90%EC%A0%95">PASS / CAUTION / FAIL 판정</h3>
<ol>
<li>각 기준 Gate 조건 <strong>통과/미통과</strong> 판정</li>
<li>통과 수 합산 → 3단계 판정</li>
<li><strong>CAUTION</strong> 이상 → 후보 유지, <strong>FAIL</strong> → 제외</li>
<li>통계 기준 미통과 시 → 추가 실행 권고</li>
</ol>
</div>
</div>

<h1 id="appendix-h-1-admet--%EC%8B%A0%EC%9E%A5%EB%8F%85%EC%84%B1--%EA%B3%84%EC%82%B0%EC%8B%9D--%EB%AA%A8%EB%8D%B8">Appendix H-1: ADMET &amp; 신장독성 — 계산식 &amp; 모델</h1>
<div class="columns">
<div class="col">
<h3 id="%EC%8B%A0%EC%9E%A5%EB%8F%85%EC%84%B1-%EC%9C%84%ED%97%98-%EC%A0%90%EC%88%98-renal-retention-risk">신장독성 위험 점수 (Renal Retention Risk)</h3>
<p>PRRT 방사성의약품은 <strong>신장 배출이 주경로</strong>이며, 양이온성 잔기가 세뇨관 재흡수를 증가시킵니다.</p>
<p><strong>공식</strong>:</p>
<p><code>Risk = min(100, (n_K + n_R) × 20 + max(0, Q_net) × 15)</code></p>
<table>
<thead>
<tr>
<th>변수</th>
<th>정의</th>
</tr>
</thead>
<tbody>
<tr>
<td>n_K</td>
<td>Lys 잔기 수 (강양이온, +1.0)</td>
</tr>
<tr>
<td>n_R</td>
<td>Arg 잔기 수 (강양이온, +1.0)</td>
</tr>
<tr>
<td>Q_net</td>
<td>pH 7.4 순전하 (His +0.1 기여)</td>
</tr>
</tbody>
</table>
<p><strong>등급</strong>: Low(&lt;30, 허용) · Moderate(30~60, 아미노산 병용) · High(&gt;60, Gelofusine)</p>
</div>
<div class="col">
<h3 id="%EA%B8%B0%EC%A4%80%EC%84%A0-%EC%9E%84%EC%83%81-%EB%B0%A9%EC%82%AC%EC%84%B1%EC%9D%98%EC%95%BD%ED%92%88">기준선: 임상 방사성의약품</h3>
<table>
<thead>
<tr>
<th>약물</th>
<th style="text-align:center">n_K</th>
<th style="text-align:center">n_R</th>
<th style="text-align:center">Q_net</th>
<th style="text-align:center">Risk</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>DOTATATE</strong></td>
<td style="text-align:center">1</td>
<td style="text-align:center">0</td>
<td style="text-align:center">~+1</td>
<td style="text-align:center"><strong>~35</strong></td>
</tr>
<tr>
<td>SST-14 (WT)</td>
<td style="text-align:center">2</td>
<td style="text-align:center">0</td>
<td style="text-align:center">~+1</td>
<td style="text-align:center"><strong>~55</strong></td>
</tr>
<tr>
<td>Octreotide</td>
<td style="text-align:center">1</td>
<td style="text-align:center">0</td>
<td style="text-align:center">~+1</td>
<td style="text-align:center"><strong>~35</strong></td>
</tr>
</tbody>
</table>
<p><small>DOTATATE Moderate → 임상에서 아미노산 병용주입으로 관리 [24]</small></p>
<h3 id="druglikeness-0100">Druglikeness (0~100)</h3>
<p>MW 1200~2000(+25) · |Q_net|≤3(+25) · GRAVY<a href="+25">−2,+1</a> · 동일잔기연속&lt;3(+25)</p>
<p><small>예측 모델 참조: ProTox 3.0 AUC=<strong>0.86–0.89</strong> [25] · pkCSM OCT2 기질 AUC=<strong>0.810</strong> [25] · ADMETlab AUC=<strong>0.780</strong> [26] · 본 시스템은 rule-based scoring 사용</small></p>

<h1 id="appendix-h-2-flexpepdock--%EB%8F%84%ED%82%B9-%ED%94%84%EB%A1%9C%ED%86%A0%EC%BD%9C-%EC%83%81%EC%84%B8">Appendix H-2: FlexPepDock — 도킹 프로토콜 상세</h1>
<div class="columns">
<div class="col">
<h3 id="%ED%94%84%EB%A1%9C%ED%86%A0%EC%BD%9C-%EA%B0%9C%EC%9A%94">프로토콜 개요</h3>
<p>PyRosetta FlexPepDock [1,2]은 수용체-펩타이드 복합체의 <strong>유연 백본 정제</strong>(flexible backbone refinement)를 수행합니다.</p>
<p><strong>초기화 플래그</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>-mute all
-ex1 -ex2aro
-ignore_unrecognized_res
-flexPepDocking:pep_refine
-constraints:cst_fa_weight 1.0
</code></pre>
<h3 id="3%EB%8B%A8%EA%B3%84-%EC%A0%95%EC%A0%9C">3단계 정제</h3>
<table>
<thead>
<tr>
<th style="text-align:center">Step</th>
<th>동작</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center">1</td>
<td>MutateResidue (백본 보존)</td>
</tr>
<tr>
<td style="text-align:center">2</td>
<td>곁사슬 chi각 최적화</td>
</tr>
<tr>
<td style="text-align:center">3</td>
<td>백본 유연 최소화 (수용체 고정)</td>
</tr>
</tbody>
</table>
</div>
<div class="col">
<h3 id="%EC%B6%94%EC%B6%9C-%EC%97%90%EB%84%88%EC%A7%80-%EC%A7%80%ED%91%9C">추출 에너지 지표</h3>
<table>
<thead>
<tr>
<th>지표</th>
<th>계산 방법</th>
<th>의미</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>ddG</strong></td>
<td>InterfaceAnalyzer(jump=1)</td>
<td>결합 자유 에너지 변화</td>
</tr>
<tr>
<td><strong>total_score</strong></td>
<td>REF2015 full-atom</td>
<td>전체 에너지</td>
</tr>
<tr>
<td><strong>clash_count</strong></td>
<td>fa_rep &gt; 10.0 REU 잔기 수</td>
<td>원자 충돌</td>
</tr>

<td>Interface H-bond 수</td>
<td>수소 결합</td>
</tr>

<h3 id="%EC%9D%B4%ED%99%A9%ED%99%94-%EA%B2%B0%ED%95%A9-cys3-cys14">이황화 결합 (Cys3-Cys14)</h3>
<ol>
<li><code>detect_disulfides()</code> 자동 탐지</li>
<li>실패 → <strong>AtomPairConstraint</strong> (2.05Å, σ=0.3)</li>
<li>정제 후 SG-SG &lt; 3.0Å → intact</li>
</ol>
<p><small>ddG는 <strong>동일 조건 내 상대 비교</strong>에 최적화 — 후보 간 순위가 절대값보다 신뢰 [1,2]</small></p>

<div class="columns">

<h3 id="sst-14-somatostatin-14">SST-14 (Somatostatin-14)</h3>
<p><strong>서열</strong>: <code>AGCKNFFWKTFTSC</code> (14 AA, cyclic)<br />
<strong>이황화</strong>: Cys3-Cys14 (β-hairpin 안정화)<br />
<strong>MW</strong>: 1,638.8 Da · <strong>pI</strong>: ~9.2</p>
<h3 id="fwkt-%ED%8C%8C%EB%A7%88%EC%BD%94%ED%8F%AC%EC%96%B4-%EC%9C%84%EC%B9%98-7-10">FWKT 파마코포어 (위치 7-10)</h3>

<thead>
<tr>
<th>잔기</th>
<th>역할</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Phe7</strong></td>
<td>상부 소수성 포켓 방향족 스태킹</td>
</tr>
<tr>
<td><strong>Trp8</strong></td>
<td>Ile177/Phe208/Phe272 <strong>깊은 소수성 포켓</strong> 삽입</td>
</tr>
<tr>

<td><strong>Asp122와 2.7Å 염다리</strong> (필수)</td>
</tr>
<tr>

<h1 id="appendix-j-2-%ED%86%B5%ED%95%A9-%EC%88%98%EC%8B%9D-%EB%A0%88%ED%8D%BC%EB%9F%B0%EC%8A%A4--%EC%8A%A4%EC%BD%94%EC%96%B4%EB%A7%81%ED%86%B5%EA%B3%84%EA%B2%80%EC%A6%9D">Appendix J-2: 통합 수식 레퍼런스 — 스코어링·통계·검증</h1>
<div class="columns">
<div class="col">
<h3 id="silo-%EC%8A%A4%EC%BD%94%EC%96%B4%EB%A7%81-c-1">Silo 스코어링 (C-1)</h3>
<table>
<thead>
<tr>
<th>Silo</th>
<th>수식</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>B</strong></td>
<td><code>S = 0.70·ddG + 0.20·total + 0.10·clash</code></td>
</tr>
<tr>
<td><strong>A</strong></td>
<td><code>S = 0.15·pLDDT + 0.25·dock + 0.25·ddG + 0.15·lDDT + 0.20·sel</code></td>
</tr>
</tbody>
</table>
<p><small>전 메트릭 MinMax [0,1] 정규화 · lower-is-better → 1−norm(x) · 경위반: −8.0/−0.4</small></p>
<h3 id="qc-gate-4%EB%8B%A8%EA%B3%84-c-2">QC Gate 4단계 (C-2)</h3>
<table>
<thead>
<tr>
<th>Gate</th>
<th>조건</th>
<th>기본값</th>
</tr>
</thead>
<tbody>
<tr>
<td>G1</td>
<td>pLDDT ≥ T₁, interface ≥ T₂</td>
<td>50, 45</td>
</tr>
<tr>
<td>G2</td>
<td>dock top P%</td>
<td>20%</td>
</tr>
<tr>
<td>G3</td>

<td>−5.0, 10</td>
</tr>
<tr>

<td>−10, −15</td>
</tr>

<h3 id="unified-validation-g-1">Unified Validation (G-1)</h3>
<p><code>PASS ≥ 14/17 · CAUTION 11-13 · FAIL ≤ 10</code></p>

<div class="col">
<h3 id="thompson-sampling-c-3">Thompson Sampling (C-3)</h3>
<table>
<thead>
<tr>
<th>단계</th>
<th>수식</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>사전분포</strong></td>
<td><code>Beta(α=1, β=1)</code></td>
</tr>
<tr>
<td><strong>갱신</strong></td>
<td>ddG &lt; baseline → α++ · else β++</td>
</tr>
<tr>
<td><strong>샘플링</strong></td>
<td><code>θᵢ ~ Beta(αᵢ, βᵢ)</code> → top-N 선택</td>
</tr>
<tr>
<td><strong>기댓값</strong></td>
<td><code>E[θ] = α/(α+β)</code></td>
</tr>
</tbody>
</table>
<h3 id="mann-whitney-%EC%88%98%EB%A0%B4-c-4">Mann-Whitney 수렴 (C-4)</h3>

<th>수식</th>
</tr>
</thead>
<tbody>
<tr>

<td><strong>정규근사</strong></td>

<td>`σ /</td>
</tr>
<tr>
<td><strong>수렴조건</strong></td>

</tr>
